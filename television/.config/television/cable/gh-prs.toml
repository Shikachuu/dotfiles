[metadata]
name = "gh-prs"
description = "List GitHub PRs for the current repo"
requirements = ["gh", "jq"]

[source]
command = '''gh pr list --state open --limit 100 --json number,title,createdAt,author,labels,reviewDecision | jq -r 'sort_by(.createdAt) | reverse | .[] | (if .reviewDecision == "APPROVED" then "\u001b[32m\u2713\u001b[39m" elif .reviewDecision == "CHANGES_REQUESTED" then "\u001b[31m\u2717\u001b[39m" else "\u001b[90m\u00b7\u001b[39m" end) + " \u001b[32m#\(.number)\u001b[39m   " + (.title | if length > 52 then .[0:49] + "..." else . + (" " * (52 - length)) end) + "  \u001b[33m" + ("@\(.author.login)" | if length > 18 then .[0:18] else . + (" " * (18 - length)) end) + "\u001b[39m" + (if (.labels | length) > 0 then "  " + ([.labels[] | "\u001b[35m" + .name + "\u001b[39m"] | join(" ")) else "" end)'
'''
output = '{strip_ansi|split:#:1|split:   :0}'
ansi = true

[ui]
layout = "portrait"

[preview]
command = '''gh pr view '{strip_ansi|split:#:1|split:   :0}' --json number,title,body,state,headRefName,baseRefName,author,createdAt,updatedAt,mergeable,changedFiles,additions,deletions,labels,assignees,reviewDecision,latestReviews,statusCheckRollup,headRepository,headRepositoryOwner | jq -r '
"  " + .title,
"  #" + (.number | tostring),
"",
"  \u001b[36mStatus:\u001b[39m \u001b[32m" + .state + "\u001b[39m  " + .baseRefName + " ← " + .headRefName,
"  \u001b[36mRepo:\u001b[39m \u001b[34m" + (.headRepositoryOwner.login) + "/" + (.headRepository.name) + "\u001b[39m",
"  \u001b[36mAuthor:\u001b[39m \u001b[33m" + .author.login + "\u001b[39m",
"  \u001b[36mCreated:\u001b[39m " + (.createdAt | fromdateiso8601 | (now - .) | if . < 3600 then (./60|floor|tostring) + " minutes ago" elif . < 86400 then (./3600|floor|tostring) + " hours ago" else (./86400|floor|tostring) + " days ago" end),
"  \u001b[36mUpdated:\u001b[39m " + (.updatedAt | fromdateiso8601 | (now - .) | if . < 3600 then (./60|floor|tostring) + " minutes ago" elif . < 86400 then (./3600|floor|tostring) + " hours ago" else (./86400|floor|tostring) + " days ago" end),
(if (.labels | length) > 0 then "  \u001b[36mLabels:\u001b[39m " + ([.labels[] | "\u001b[35m" + .name + "\u001b[39m"] | join(" ")) else "" end),
"  \u001b[36mMerge Status:\u001b[39m " + (if .mergeable == "MERGEABLE" then "\u001b[32m\u2713 Clean\u001b[39m" elif .mergeable == "CONFLICTING" then "\u001b[31m\u2717 Dirty\u001b[39m" else "\u001b[33m? Unknown\u001b[39m" end),
"  \u001b[36mChanges:\u001b[39m " + (.changedFiles | tostring) + " files  \u001b[32m+" + (.additions | tostring) + "\u001b[39m \u001b[31m-" + (.deletions | tostring) + "\u001b[39m",
(.latestReviews | if length > 0 then "  \u001b[36mReviewers:\u001b[39m", (.[] | "    " + (if .state == "APPROVED" then "\u001b[32m\u2713\u001b[39m" elif .state == "CHANGES_REQUESTED" then "\u001b[31m\u2717\u001b[39m" else "\u001b[33m\u25cc\u001b[39m" end) + " \u001b[33m@" + .author.login + "\u001b[39m") else empty end),
(.statusCheckRollup | if length > 0 then "  \u001b[36mChecks:\u001b[39m", (.[] | "    " + (if (.conclusion == "SUCCESS" or .state == "SUCCESS") then "\u001b[32m\u2713\u001b[39m" elif (.conclusion == "FAILURE" or .conclusion == "TIMED_OUT" or .state == "FAILURE" or .state == "ERROR") then "\u001b[31m\u2717\u001b[39m" elif (.conclusion == "ACTION_REQUIRED") then "\u001b[31m!\u001b[39m" elif (.conclusion == "CANCELLED" or .conclusion == "SKIPPED") then "\u001b[90m-\u001b[39m" elif (.status == "IN_PROGRESS" or .status == "QUEUED" or .state == "PENDING") then "\u001b[33m\u25cb\u001b[39m" else "\u001b[90m\u00b7\u001b[39m" end) + " " + (.name // .context)) else empty end),
"",
"  \u001b[90m────────────────────────────────────────────────────────────\u001b[39m",
"",
(.body // "")'
'''

[keybindings]
enter = "actions:open"

[actions.open]
description = "Open the PR in the browser"
command = "gh pr view {strip_ansi|split:#:1|split:   :0} --web"
mode = "execute"

[actions.checkout]
description = "Checkout the PR branch locally"
command = "gh pr checkout {strip_ansi|split:#:1|split:   :0}"
mode = "execute"

[actions.merge]
description = "Merge the selected PR"
command = "gh pr merge {strip_ansi|split:#:1|split:   :0}"
mode = "execute"
